<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      box-sizing: border-box;
    }

    @page {
      size: A4 landscape;
      margin: 6mm; 
    }

    @media print {
      html, body {
        width: 285mm;
        margin: 0;
        padding: 0;
        background: white;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      .sheet {
        page-break-after: always;
      }
      .sheet:last-child {
        page-break-after: auto;
      }
    }

    @media screen {
      body {
        max-width: 285mm;
        margin: 20px auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
      }
    }

    body {
      font-family: Arial, sans-serif;
      color: #000;
      background: white;
      width: 285mm;
      margin: 0;
      padding: 0;
    }

    .sheet {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 198mm;
      gap: 8mm; /* Clear spacing between the copies */
      margin-bottom: 20px;
    }

    .sheet.single-mode {
      justify-content: flex-start;
    }

    .sheet.double-mode {
      justify-content: space-between;
    }

    .bill-copy {
      flex: 1; /* Takes 50% minus half the gap */
      border: 1.5pt solid #000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      height: 100%;
    }

    .sheet.single-mode .bill-copy {
      flex: none;
      width: calc(50% - 4mm);
    }

    /* Header */
    .copy-label {
      background: none;
      color: #000;
      padding: 3px 10px;
      font-size: 7.5pt;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
      border-bottom: 1.5pt solid #000;
    }

    .header-section {
      display: grid;
      grid-template-columns: 2fr 1fr;
      border-bottom: 1.5pt solid #000;
    }

    .brand-area {
      padding: 10px;
      border-right: 1.5pt solid #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand-area h1 {
      margin: 0 0 2px 0;
      font-size: 15pt;
      font-weight: 900;
      color: #000;
      letter-spacing: 0;
    }

    .brand-area p {
      margin: 1px 0;
      font-size: 7.5pt;
      font-weight: bold;
      color: #000;
    }

    .meta-area {
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .invoice-title {
      font-size: 11pt;
      font-weight: 900;
      display: flex;
      justify-content: space-between;
      border-bottom: 1pt solid #000;
      padding-bottom: 3px;
      margin-bottom: 5px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      font-size: 7.5pt;
      margin-bottom: 2px;
      font-weight: bold;
    }

    /* Bank info */
    .info-bar {
      display: flex;
      border-bottom: 1.5pt solid #000;
      font-size: 7.5pt;
      font-weight: bold;
    }

    .info-item {
      padding: 5px 10px;
      border-right: 1.5pt solid #000;
    }
    .info-item:last-child {
      border-right: none;
    }

    /* Party */
    .party-section {
      padding: 8px 10px;
      border-bottom: 1.5pt solid #000;
      min-height: 85px; /* PHASE 2: Very Small Data Block */
      display: flex;
      flex-direction: column;
    }

    .section-label {
      font-size: 6.5pt;
      font-weight: 900;
      color: #000;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .party-name {
      font-size: 11pt;
      font-weight: 900;
      margin-bottom: 2px;
      word-break: break-word; /* PHASE 1: Text Wrapping */
      white-space: normal;
    }

    .party-address {
      font-size: 8pt;
      font-weight: bold;
      word-break: break-word; /* PHASE 1: Text Wrapping */
      white-space: normal;
      flex-grow: 1; /* Pushes GST to bottom if short address */
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .party-gst {
      margin-top: 4px;
      font-size: 9.5pt;
      font-weight: 900;
    }
    
    .highlighted {
      background: none;
      color: #000;
      border: 1pt solid #000;
      padding: 2px 4px;
    }

    /* Table */
    .table-container {
      flex: 1; /* Fill middle space */
      display: flex;
      flex-direction: column;
      overflow: hidden; /* PHASE 3 */
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th {
      background: none;
      color: #000;
      font-size: 7.5pt;
      padding: 8px 10px;
      text-align: center;
      border-bottom: 1.5pt solid #000;
      font-weight: 900;
      /* Fixed columns logic provided inline by printService */
    }

    tbody tr {
      height: 28px; /* PHASE 3: Fixed Row Height slightly increased */
    }

    td {
      padding: 8px 10px;
      border-bottom: 0.5pt solid #444;
      font-size: 8.5pt;
      font-weight: bold;
      text-align: center;
      
      /* PHASE 4: Text Overflow */
      white-space: normal;
      word-break: break-word;
      color: #000;
    }
    
    .numeric-cell {
      white-space: nowrap;
      overflow: hidden;
      font-variant-numeric: tabular-nums;
      color: #000 !important;
    }

    td:not(:last-child), th:not(:last-child) {
      border-right: 1.5pt solid #000;
    }

    .text-right { text-align: right; }
    .text-center { text-align: center; }
    .text-left { text-align: left; }

    /* Calc */
    .calc-grid {
      display: flex;
      border-top: 1.5pt solid #000;
      /* removed border-bottom to prevent double border with total-strip */
    }

    .calc-notes {
      flex: 1.5;
      padding: 8px 10px;
      border-right: 1.5pt solid #000;
      font-size: 7.5pt;
      font-weight: bold;
      word-break: break-word; /* Wrapping for notes */
      white-space: normal;
    }

    .calc-table {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .calc-row {
      display: grid;
      grid-template-columns: 1fr 140px;
      border-bottom: 1pt solid #000;
    }
    .calc-row:last-child {
      border-bottom: none;
    }

    .calc-label {
      padding: 8px 10px;
      font-size: 8pt;
      font-weight: 900;
      border-right: 1.5pt solid #000;
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .calc-value {
      padding: 8px 10px;
      font-size: 9pt;
      font-weight: 900;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      color: #000 !important;
    }

    .amount-box {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
      color: #000 !important;
    }

    /* Total Strip */
    .total-strip {
      display: grid;
      grid-template-columns: 1fr 140px;
      align-items: center;
      padding: 10px 0 10px 10px;
      background: none;
      color: #000;
      border-top: 2pt solid #000;
      min-height: 55px; /* PHASE 5: Net amount block always fixed height */
    }

    .total-label {
      font-size: 9.5pt;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .total-amount {
      padding-right: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .net-value {
      font-size: 16pt;
      font-weight: 900;
      width: 100%;
      white-space: nowrap;
      overflow: visible;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.5px;
    }

    /* Footer */
    .footer-section {
      display: flex;
      min-height: 65px; 
      border-top: 1pt solid #000;
    }

    .shipping-details {
      flex: 2;
      padding: 8px 10px;
      border-right: 1.5pt solid #000;
    }

    .signature-area {
      flex: 1;
      padding: 8px 10px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .sig-title {
      font-size: 7.5pt;
      font-weight: 900;
      text-transform: uppercase;
    }

    .bale-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      margin-top: 4px;
    }

    .bale-item {
      border: 1pt solid #000;
      text-align: center;
      font-size: 10pt;
      font-weight: 900;
      padding: 2px 4px;
      min-width: 25px;
    }
  </style>
</head>
<body>
  {{{SHEETS_HTML}}}
  <script>
    function fitText(elements, maxFont = 16, minFont = 9) {
      elements.forEach(element => {
        let fontSize = maxFont;
        element.style.fontSize = fontSize + "pt";
        element.style.letterSpacing = "0.5px";
        
        while (element.scrollWidth > element.offsetWidth && fontSize > minFont) {
          fontSize -= 0.5;
          element.style.fontSize = fontSize + "pt";
          if (fontSize < (maxFont + minFont)/2) {
             element.style.letterSpacing = "0px";
          }
        }
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      // Scale down net amounts if they get too large
      const netValues = document.querySelectorAll(".net-value");
      fitText(netValues, 16, 8);
      
      // Also scale down subtotals if needed
      const subtotals = document.querySelectorAll(".calc-value .amount-box");
      fitText(subtotals, 9, 6);
    });
  </script>
</body>
</html>
