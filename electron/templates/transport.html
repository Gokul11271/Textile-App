<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      box-sizing: border-box;
    }

    @page {
      size: A4 landscape;
      margin: 6mm; 
    }

    @media print {
      html, body {
        width: 285mm;
        height: 198mm;
        margin: 0;
        padding: 0;
        background: white;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
    }

    @media screen {
      body {
        max-width: 285mm;
        margin: 20px auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
      }
    }

    body {
      font-family: Arial, sans-serif;
      color: #000;
      background: white;
      width: 285mm;
      height: 198mm;
      margin: 0;
      padding: 0;
    }

    .sheet {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 100%;
      gap: 8mm; /* Clear spacing between the copies */
    }

    .bill-copy {
      flex: 1; /* Takes 50% minus half the gap */
      border: 1.5pt solid #000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      height: 100%;
    }

    /* Header */
    .copy-label {
      background: none;
      color: #000;
      padding: 3px 10px;
      font-size: 7.5pt;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
      border-bottom: 1.5pt solid #000;
    }

    .header-section {
      display: grid;
      grid-template-columns: 2fr 1fr;
      border-bottom: 1.5pt solid #000;
    }

    .brand-area {
      padding: 10px;
      border-right: 1.5pt solid #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand-area h1 {
      margin: 0 0 2px 0;
      font-size: 15pt;
      font-weight: 900;
      color: #000;
      letter-spacing: 0;
    }

    .brand-area p {
      margin: 1px 0;
      font-size: 7.5pt;
      font-weight: bold;
      color: #000;
    }

    .meta-area {
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .invoice-title {
      font-size: 11pt;
      font-weight: 900;
      display: flex;
      justify-content: space-between;
      border-bottom: 1pt solid #000;
      padding-bottom: 3px;
      margin-bottom: 5px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      font-size: 7.5pt;
      margin-bottom: 2px;
      font-weight: bold;
    }

    /* Bank info */
    .info-bar {
      display: flex;
      border-bottom: 1.5pt solid #000;
      font-size: 7.5pt;
      font-weight: bold;
    }

    .info-item {
      padding: 5px 10px;
      border-right: 1.5pt solid #000;
    }
    .info-item:last-child {
      border-right: none;
    }

    /* Party */
    .party-section {
      padding: 8px 10px;
      border-bottom: 1.5pt solid #000;
      min-height: 85px; /* PHASE 2: Very Small Data Block */
      display: flex;
      flex-direction: column;
    }

    .section-label {
      font-size: 6.5pt;
      font-weight: 900;
      color: #000;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .party-name {
      font-size: 11pt;
      font-weight: 900;
      margin-bottom: 2px;
      word-break: break-word; /* PHASE 1: Text Wrapping */
      white-space: normal;
    }

    .party-address {
      font-size: 8pt;
      font-weight: bold;
      word-break: break-word; /* PHASE 1: Text Wrapping */
      white-space: normal;
      flex-grow: 1; /* Pushes GST to bottom if short address */
    }

    .party-gst {
      margin-top: 4px;
      font-size: 8pt;
      font-weight: bold;
    }
    
    .highlighted {
      background: none;
      color: #000;
      border: 1pt solid #000;
      padding: 2px 4px;
    }

    /* Table */
    .table-container {
      flex: 1; /* Fill middle space */
      display: flex;
      flex-direction: column;
      overflow: hidden; /* PHASE 3 */
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th {
      background: none;
      color: #000;
      font-size: 7.5pt;
      padding: 5px 6px;
      text-align: left;
      border-bottom: 1.5pt solid #000;
      font-weight: 900;
      /* Fixed columns logic provided inline by printService */
    }

    tbody tr {
      height: 24px; /* PHASE 3: Fixed Row Height */
    }

    td {
      padding: 3px 6px;
      border-bottom: 0.5pt solid #444;
      font-size: 8.5pt;
      font-weight: bold;
      
      /* PHASE 4: Text Overflow */
      white-space: normal;
      word-break: break-word;
    }
    
    td:not(:last-child), th:not(:last-child) {
      border-right: 1.5pt solid #000;
    }

    .text-right { text-align: right; }
    .text-center { text-align: center; }

    /* Calc */
    .calc-grid {
      display: flex;
      border-top: 1.5pt solid #000;
      /* removed border-bottom to prevent double border with total-strip */
    }

    .calc-notes {
      flex: 1.5;
      padding: 8px 10px;
      border-right: 1.5pt solid #000;
      font-size: 7.5pt;
      font-weight: bold;
      word-break: break-word; /* Wrapping for notes */
      white-space: normal;
    }

    .calc-table {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .calc-row {
      display: grid;
      grid-template-columns: 1fr 110px;
      border-bottom: 1pt solid #000;
    }
    .calc-row:last-child {
      border-bottom: none;
    }

    .calc-label {
      padding: 4px 8px;
      font-size: 8pt;
      font-weight: 900;
      border-right: 1.5pt solid #000;
      background: none;
      display: flex;
      align-items: center;
    }

    .calc-value {
      padding: 4px 8px;
      font-size: 9pt;
      font-weight: 900;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .amount-box {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 4px;
    }

    /* Total Strip */
    .total-strip {
      display: grid;
      grid-template-columns: 1fr 110px;
      align-items: center;
      padding: 10px 0 10px 10px;
      background: none;
      color: #000;
      border-top: 2pt solid #000;
      min-height: 55px; /* PHASE 5: Net amount block always fixed height */
    }

    .total-label {
      font-size: 9.5pt;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .total-amount {
      padding-right: 8px;
    }

    .net-value {
      font-size: 16pt;
      font-weight: 900;
    }

    /* Footer */
    .footer-section {
      display: flex;
      min-height: 65px; 
      border-top: 1pt solid #000;
    }

    .shipping-details {
      flex: 2;
      padding: 8px 10px;
      border-right: 1.5pt solid #000;
    }

    .signature-area {
      flex: 1;
      padding: 8px 10px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .sig-title {
      font-size: 7.5pt;
      font-weight: 900;
      text-transform: uppercase;
    }

    .bale-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      margin-top: 4px;
    }

    .bale-item {
      border: 1pt solid #000;
      text-align: center;
      font-size: 8pt;
      font-weight: 900;
      padding: 2px 4px;
      min-width: 25px;
    }
  </style>
</head>
<body>
  <div class="sheet">
    {{COPIES_HTML}}
  </div>
</body>
</html>
